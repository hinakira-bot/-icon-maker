// --- Lucide Icon wrapper ---
function Icon({ name, size = 18, className = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) {
      ref.current.innerHTML = '';
      const el = lucide.createElement(lucide.icons[name]);
      el.setAttribute('width', size);
      el.setAttribute('height', size);
      if (className) el.setAttribute('class', className);
      ref.current.appendChild(el);
    }
  }, [name, size, className]);
  return <span ref={ref} className="inline-flex items-center" />;
}

// --- チップ選択コンポーネント ---
function ChipSelect({ options, selected, onChange }) {
  return (
    <div className="flex flex-wrap gap-1.5">
      {options.map((opt) => (
        <button key={opt.id} onClick={() => onChange(opt.id)}
          className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all border ${
            selected === opt.id
              ? 'bg-brand-500 text-white border-brand-500 shadow-sm'
              : 'bg-white text-gray-600 border-gray-200 hover:border-brand-200 hover:bg-brand-50'
          }`}
        >
          {opt.label}
        </button>
      ))}
    </div>
  );
}

// --- セクション ---
function Section({ title, iconName, children, customValue, onCustomChange, placeholder }) {
  return (
    <div className="mb-6 fade-in">
      <h3 className="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2">
        <span className="text-brand-500"><Icon name={iconName} size={16} /></span>
        {title}
      </h3>
      {children}
      {onCustomChange && (
        <div className="relative mt-2">
          <input type="text" value={customValue || ''} onChange={(e) => onCustomChange(e.target.value)}
            placeholder={placeholder || '追加の要素を英語で入力...'}
            className="w-full p-2 pl-8 rounded-lg border border-gray-200 bg-white/80 focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none text-xs transition-all"
          />
          <span className="absolute left-2.5 top-2.5 text-gray-300"><Icon name="Pencil" size={12} /></span>
        </div>
      )}
    </div>
  );
}

    tops: '', bottoms: '', bg: '', angle: '', bgText: '', global: ''

  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');

    const v = (opts, id) => (opts.find(o => o.id === id) || {}).value || '';
    const c = (opts, id, cu) => {
      const sv = v(opts, id);

      return cu.trim() || sv;

    const hp = [c(HAIR_COLOR_OPTIONS, sel.hairColor, custom.hairColor), c(HAIR_OPTIONS, sel.hair, custom.hair)].filter(Boolean).join(' ');

      sel.angle === 'full' ? 'full body shot' : c(ANGLE_OPTIONS, sel.angle, custom.angle),

      c(GENDER_OPTIONS, sel.gender, custom.gender), hp,
      c(EYE_OPTIONS, sel.eye, custom.eye), c(EXPRES_OPTIONS, sel.expres, custom.expres),

      c(TOPS_OPTIONS, sel.tops, custom.tops), c(BOTTOMS_OPTIONS, sel.bottoms, custom.bottoms),

      custom.global.trim(), 'masterpiece, best quality, ultra detailed, solo',
    ];
    setPrompt(parts.filter(p => p && p.trim()).join(', '));
  }, [sel, custom]);

  const handleCopy = () => {
    navigator.clipboard.writeText(prompt).then(() => { setIsCopied(true); setTimeout(() => setIsCopied(false), 2000); });
  };

  const handleGenerate = async () => {
    if (!apiKey.trim()) { setGenError('APIキーを入力してください'); return; }
    setIsGenerating(true); setGenError(''); setGeneratedImage(null);
    try {
      const res = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey.trim() },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `Generate an image based on this description. Output ONLY the image: ${prompt}` }] }],
            generationConfig: { responseModalities: ['IMAGE', 'TEXT'] }
          })
        }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || `API Error: ${res.status}`);
      const cand = data.candidates?.[0];
      if (!cand) {
        const br = data.promptFeedback?.blockReason;
        throw new Error(br ? `ブロックされました: ${br}` : 'レスポンスが空です');
      }
      if (cand.finishReason === 'SAFETY' || cand.finishReason === 'IMAGE_SAFETY')
        throw new Error('安全フィルターによりブロックされました。プロンプトを変更してください。');
      const imgPart = (cand.content?.parts || []).find(p => p.inlineData);
      if (!imgPart) {
        const txt = (cand.content?.parts || []).find(p => p.text);
        throw new Error(`画像が生成されませんでした。${txt ? '\nAI: ' + txt.text.slice(0, 150) : ''}`);
      }
      const src = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
      setGeneratedImage(src);
      setImageHistory(prev => [src, ...prev].slice(0, 20));
      setBasePromptForVariation(prompt);
    } catch (err) {
      setGenError(err.message || '画像生成に失敗しました');
    } finally { setIsGenerating(false); }
  };

  const handleDownload = (src) => {
    const a = document.createElement('a');
    a.href = src; a.download = `icon_${Date.now()}.png`; a.click();
  };

  // 表情バリエーション
  const EXPRESSION_VARIATIONS = [
    { id: 'smile', label: '😊 笑顔', value: 'gentle smile, happy expression' },
    { id: 'laugh', label: '😆 大笑い', value: 'laughing, excited, open mouth, energetic' },
    { id: 'cool', label: '😎 クール', value: 'expressionless, cool vibe, mysterious' },
    { id: 'wink', label: '😉 ウインク', value: 'winking, playful expression' },
    { id: 'angry', label: '😠 怒り', value: 'angry face, annoyed, furrowed brows' },
    { id: 'sad', label: '😢 泣き', value: 'crying, tears, sad expression' },
    { id: 'surprised', label: '😲 驚き', value: 'surprised, open mouth, wide eyes' },
    { id: 'blush', label: '😳 赤面', value: 'blushing, shy, embarrassed, flustered' },
    { id: 'smug', label: '😏 ドヤ顔', value: 'smug face, confident, half-closed eyes' },
    { id: 'peace', label: '✌️ ピース', value: 'peace sign, cheerful, cute pose' },
    { id: 'think', label: '🤔 考え中', value: 'thinking, hand on chin, pondering' },
    { id: 'sleep', label: '😴 眠い', value: 'sleepy, drowsy, closed eyes, zzz' },
  ];

  const handleExpressionVariation = async (expr) => {
    if (!apiKey.trim() || !basePromptForVariation) return;
    setVariationGenerating(expr.id);
    setGenError('');

    // 既存の表情部分を除去して新しい表情に差し替え
    const allExprValues = EXPRES_OPTIONS.filter(o => o.id !== 'none').map(o => o.value);
    const allVarValues = EXPRESSION_VARIATIONS.map(o => o.value);
    let modifiedPrompt = basePromptForVariation;
    [...allExprValues, ...allVarValues].forEach(ev => {
      ev.split(', ').forEach(part => {
        modifiedPrompt = modifiedPrompt.replace(new RegExp(',?\\s*' + part.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*,?', 'gi'), ', ');
      });
    });
    modifiedPrompt = modifiedPrompt.replace(/,\s*,/g, ',').replace(/,\s*$/, '').replace(/^\s*,/, '');
    modifiedPrompt += `, ${expr.value}`;

    try {
      const res = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey.trim() },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `Generate an image based on this description. Output ONLY the image. Keep the same character design but change the expression: ${modifiedPrompt}` }] }],
            generationConfig: { responseModalities: ['IMAGE', 'TEXT'] }
          })
        }
      );
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || `API Error: ${res.status}`);
      const cand = data.candidates?.[0];
      if (!cand) throw new Error('レスポンスが空です');
      if (cand.finishReason === 'SAFETY' || cand.finishReason === 'IMAGE_SAFETY')
        throw new Error('安全フィルターによりブロックされました');
      const imgPart = (cand.content?.parts || []).find(p => p.inlineData);
      if (!imgPart) throw new Error('画像が生成されませんでした');
      const src = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
      setGeneratedImage(src);
      setImageHistory(prev => [src, ...prev].slice(0, 20));
    } catch (err) {
      setGenError(err.message || '表情バリエーション生成に失敗しました');
    } finally { setVariationGenerating(''); }
  };

  const handleRandom = () => {
    const rp = (opts) => { const v = opts.filter(o => o.id !== 'none'); return v.length ? v[Math.floor(Math.random() * v.length)].id : 'none'; };
    setSel({
      style: rp(STYLE_OPTIONS), gender: rp(GENDER_OPTIONS),
      ethnicity: Math.random() > 0.7 ? rp(ETHNICITY_OPTIONS) : 'none',
      faceTaste: Math.random() > 0.5 ? rp(FACE_TASTE_OPTIONS) : 'none',
      hair: rp(HAIR_OPTIONS), hairColor: rp(HAIR_COLOR_OPTIONS), eye: rp(EYE_OPTIONS),
      expres: rp(EXPRES_OPTIONS), fashionTheme: rp(FASHION_THEME_OPTIONS),
      tops: Math.random() > 0.5 ? rp(TOPS_OPTIONS) : 'none',
      bottoms: Math.random() > 0.5 ? rp(BOTTOMS_OPTIONS) : 'none',
      bg: rp(BG_OPTIONS), angle: rp(ANGLE_OPTIONS), textPos: sel.textPos,
    });
  };

  const TABS = [
    { id: 'style', label: '画風', icon: 'Palette' }, { id: 'character', label: 'キャラ', icon: 'User' },
    { id: 'hair', label: '髪', icon: 'Scissors' }, { id: 'face', label: '顔', icon: 'Smile' },
    { id: 'fashion', label: '服装', icon: 'Shirt' }, { id: 'scene', label: '背景・構図', icon: 'Image' },
    { id: 'extra', label: 'その他', icon: 'Settings' },
  ];

  return (
    <div className="min-h-screen bg-[#f5f5f7]">
      {/* ヘッダー */}
      <header className="bg-gradient-to-r from-brand-600 to-purple-600 text-white px-4 py-3 shadow-lg sticky top-0 z-30">
        <div className="max-w-7xl mx-auto flex justify-between items-center">
          <h1 className="text-base sm:text-xl font-bold flex items-center gap-2">
            <Icon name="Sparkles" size={20} className="text-yellow-300" />
            SNSアイコンメーカー
            <span className="text-[10px] bg-white/20 px-1.5 py-0.5 rounded-full">Pro</span>
          </h1>
          <div className="flex items-center gap-2">
            {/* APIキー */}
            <div className="hidden sm:flex items-center gap-1 bg-white/10 rounded-full px-3 py-1 border border-white/20">
              <Icon name="Key" size={12} className="text-white/60" />
              <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)}
                placeholder="Gemini APIキー" className="bg-transparent text-white placeholder-white/40 text-xs w-40 outline-none" />
            </div>
            <button onClick={handleRandom}
              className="flex items-center gap-1.5 bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-full text-xs font-medium border border-white/20 transition-colors"
            ><Icon name="Shuffle" size={14} />ランダム</button>
          </div>
        </div>
      </header>

      {/* モバイル用APIキー */}
      <div className="sm:hidden px-4 pt-2">
        <div className="flex items-center gap-2 bg-white rounded-lg px-3 py-2 shadow-sm border border-gray-200">
          <Icon name="Key" size={14} className="text-gray-400" />
          <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)}
            placeholder="Gemini APIキーを入力" className="flex-1 text-xs outline-none bg-transparent" />
        </div>
      </div>

      <main className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-3 p-3">
        {/* === 左: 設定パネル === */}
        <div className="flex-1 min-w-0">
          {/* タブ */}
          <div className="flex gap-1 overflow-x-auto no-scrollbar mb-3 bg-white rounded-xl p-1 shadow-sm border border-gray-200">
            {TABS.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold whitespace-nowrap transition-all flex-shrink-0 ${
                  activeTab === t.id ? 'bg-brand-500 text-white shadow-sm' : 'text-gray-500 hover:bg-gray-100'
                }`}
              ><Icon name={t.icon} size={14} />{t.label}</button>
            ))}
          </div>

          {/* 設定内容 */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 sm:p-5 overflow-y-auto custom-scrollbar" style={{ maxHeight: 'calc(100vh - 200px)' }}>
            {activeTab === 'style' && (
              <Section title="画風・アートスタイル" iconName="Palette" customValue={custom.style} onCustomChange={v => updateCustom('style', v)}>
                <ChipSelect options={STYLE_OPTIONS} selected={sel.style} onChange={v => updateSel('style', v)} />
              </Section>
            )}
            {activeTab === 'character' && (
              <>
                <Section title="性別・種族" iconName="User" customValue={custom.gender} onCustomChange={v => updateCustom('gender', v)}>
                  <ChipSelect options={GENDER_OPTIONS} selected={sel.gender} onChange={v => updateSel('gender', v)} />
                </Section>
                <Section title="人種・肌" iconName="Globe" customValue={custom.ethnicity} onCustomChange={v => updateCustom('ethnicity', v)}>
                  <ChipSelect options={ETHNICITY_OPTIONS} selected={sel.ethnicity} onChange={v => updateSel('ethnicity', v)} />
                </Section>
                <Section title="顔の系統" iconName="UserCheck" customValue={custom.faceTaste} onCustomChange={v => updateCustom('faceTaste', v)}>
                  <ChipSelect options={FACE_TASTE_OPTIONS} selected={sel.faceTaste} onChange={v => updateSel('faceTaste', v)} />
                </Section>
              </>
            )}
            {activeTab === 'hair' && (
              <>
                <Section title="髪色" iconName="Palette" customValue={custom.hairColor} onCustomChange={v => updateCustom('hairColor', v)}>
                  <ChipSelect options={HAIR_COLOR_OPTIONS} selected={sel.hairColor} onChange={v => updateSel('hairColor', v)} />
                </Section>
                <Section title="髪型" iconName="Scissors" customValue={custom.hair} onCustomChange={v => updateCustom('hair', v)}>
                  <ChipSelect options={HAIR_OPTIONS} selected={sel.hair} onChange={v => updateSel('hair', v)} />
                </Section>
              </>
            )}
            {activeTab === 'face' && (
              <>
                <Section title="目の色・特徴" iconName="Eye" customValue={custom.eye} onCustomChange={v => updateCustom('eye', v)}>
                  <ChipSelect options={EYE_OPTIONS} selected={sel.eye} onChange={v => updateSel('eye', v)} />
                </Section>
                <Section title="表情" iconName="Smile" customValue={custom.expres} onCustomChange={v => updateCustom('expres', v)}>
                  <ChipSelect options={EXPRES_OPTIONS} selected={sel.expres} onChange={v => updateSel('expres', v)} />
                </Section>
              </>
            )}
            {activeTab === 'fashion' && (
              <>
                <Section title="ファッションテーマ" iconName="Gem" customValue={custom.fashionTheme} onCustomChange={v => updateCustom('fashionTheme', v)}>
                  <ChipSelect options={FASHION_THEME_OPTIONS} selected={sel.fashionTheme} onChange={v => updateSel('fashionTheme', v)} />
                </Section>
                <Section title="トップス" iconName="Shirt" customValue={custom.tops} onCustomChange={v => updateCustom('tops', v)}>
                  <ChipSelect options={TOPS_OPTIONS} selected={sel.tops} onChange={v => updateSel('tops', v)} />
                </Section>
                <Section title="ボトムス" iconName="Footprints" customValue={custom.bottoms} onCustomChange={v => updateCustom('bottoms', v)}>
                  <ChipSelect options={BOTTOMS_OPTIONS} selected={sel.bottoms} onChange={v => updateSel('bottoms', v)} />
                </Section>
              </>
            )}
            {activeTab === 'scene' && (
              <>
                <Section title="背景" iconName="Image" customValue={custom.bg} onCustomChange={v => updateCustom('bg', v)}>
                  <ChipSelect options={BG_OPTIONS} selected={sel.bg} onChange={v => updateSel('bg', v)} />
                </Section>
                <Section title="アングル（構図）" iconName="Aperture" customValue={custom.angle} onCustomChange={v => updateCustom('angle', v)}>
                  <ChipSelect options={ANGLE_OPTIONS} selected={sel.angle} onChange={v => updateSel('angle', v)} />
                </Section>
              </>
            )}
            {activeTab === 'extra' && (
              <>
                <Section title="文字・ロゴ" iconName="Type">
                  <input type="text" value={custom.bgText} onChange={(e) => updateCustom('bgText', e.target.value)}
                    placeholder="例: HELLO, 2025, MY NAME" className="w-full p-2.5 rounded-lg border border-gray-200 bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none text-sm transition-all mb-2" />
                  {custom.bgText.trim() && (
                    <div className="flex flex-wrap gap-1.5">
                      {TEXT_POS_OPTIONS.map(p => (
                        <button key={p.id} onClick={() => updateSel('textPos', p.id)}
                          className={`px-2.5 py-1 text-xs rounded-full border transition-all ${
                            sel.textPos === p.id ? 'bg-brand-500 text-white border-brand-500' : 'bg-white border-gray-200 text-gray-500'
                          }`}
                        >{p.label}</button>
                      ))}
                    </div>
                  )}
                  <p className="text-[10px] text-gray-400 mt-1">※AIは文字生成が苦手な場合があります</p>
                </Section>
                <Section title="全体への追加プロンプト" iconName="Pencil">
                  <textarea value={custom.global} onChange={(e) => updateCustom('global', e.target.value)}
                    placeholder="例: holding a sword, cherry blossoms, rain..."
                    className="w-full h-40 p-3 rounded-lg border border-gray-200 bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none text-sm resize-none font-mono transition-all"
                  />
                </Section>
              </>
            )}
          </div>
        </div>

        {/* === 右: プレビュー・生成 === */}
        <div className="lg:w-[420px] flex-shrink-0">
          <div className="sticky top-[60px] flex flex-col gap-3">
            {/* 画像生成エリア */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
              {/* 生成画像 or プレースホルダー */}
              <div className="relative bg-gradient-to-br from-gray-50 to-gray-100">
                {isGenerating && (
                  <div className="flex flex-col items-center justify-center py-20">
                    <span className="animate-spin mb-3"><Icon name="Loader2" size={36} className="text-brand-500" /></span>
                    <p className="text-sm text-gray-500 animate-pulse2">AIが画像を生成しています...</p>
                  </div>
                )}
                {generatedImage && !isGenerating && (
                  <img src={generatedImage} alt="Generated" className="w-full block" />
                )}
                {!generatedImage && !isGenerating && (
                  <div className="flex flex-col items-center justify-center py-16 text-gray-300">
                    <Icon name="ImagePlus" size={48} className="text-gray-200 mb-2" />
                    <p className="text-sm text-gray-400">設定を選んで生成しよう</p>
                  </div>
                )}
              </div>

              {/* ボタンバー */}
              <div className="p-3 flex gap-2 border-t border-gray-100">
                {generatedImage && (
                  <button onClick={() => handleDownload(generatedImage)}
                    className="flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg bg-green-500 hover:bg-green-600 text-white text-sm font-bold transition-all"
                  ><Icon name="Download" size={16} />保存</button>
                )}
                <button onClick={handleGenerate} disabled={isGenerating}
                  className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg font-bold text-white text-sm transition-all ${
                    isGenerating ? 'bg-brand-400 cursor-not-allowed' : 'bg-brand-500 hover:bg-brand-600 shadow-md hover:shadow-lg'
                  }`}
                >
                  {isGenerating ? (
                    <><span className="animate-spin"><Icon name="Loader2" size={16} /></span>生成中...</>
                  ) : (
                    <><Icon name="Wand2" size={16} />{generatedImage ? '再生成' : '画像を生成'}</>
                  )}
                </button>
              </div>

              {genError && (
                <div className="mx-3 mb-3 bg-red-50 border border-red-200 text-red-600 text-xs p-3 rounded-lg whitespace-pre-wrap">{genError}</div>
              )}

              {/* 表情バリエーション */}
              {generatedImage && !isGenerating && basePromptForVariation && (
                <div className="px-3 pb-3 border-t border-gray-100 pt-3 fade-in">
                  <h4 className="text-xs font-bold text-gray-600 mb-2 flex items-center gap-1.5">
                    <Icon name="Smile" size={14} className="text-brand-500" />
                    表情バリエーション
                    <span className="text-[10px] font-normal text-gray-400">同じキャラで表情だけ変更</span>
                  </h4>
                  <div className="grid grid-cols-4 gap-1.5">
                    {EXPRESSION_VARIATIONS.map(expr => (
                      <button key={expr.id} onClick={() => handleExpressionVariation(expr)}
                        disabled={!!variationGenerating}
                        className={`px-1.5 py-2 rounded-lg text-[11px] font-medium transition-all border ${
                          variationGenerating === expr.id
                            ? 'bg-brand-100 border-brand-300 text-brand-600 animate-pulse2'
                            : variationGenerating
                              ? 'bg-gray-50 border-gray-200 text-gray-300 cursor-not-allowed'
                              : 'bg-white border-gray-200 text-gray-600 hover:border-brand-300 hover:bg-brand-50 hover:text-brand-600'
                        }`}
                      >
                        {variationGenerating === expr.id ? '...' : expr.label}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* プロンプト表示（折りたたみ） */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
              <button onClick={() => setShowPrompt(!showPrompt)}
                className="w-full flex items-center justify-between px-4 py-2.5 text-sm font-bold text-gray-600 hover:bg-gray-50 transition-colors"
              >
                <span className="flex items-center gap-2"><Icon name="Code2" size={14} />完成プロンプト</span>
                <Icon name={showPrompt ? 'ChevronUp' : 'ChevronDown'} size={16} />
              </button>
              {showPrompt && (
                <div className="px-4 pb-3 fade-in">
                  <pre className="text-xs text-gray-600 bg-gray-50 rounded-lg p-3 whitespace-pre-wrap break-all font-mono leading-relaxed max-h-40 overflow-y-auto custom-scrollbar">{prompt}</pre>
                  <button onClick={handleCopy}
                    className={`mt-2 w-full flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs font-bold transition-all ${
                      isCopied ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                    }`}
                  ><Icon name={isCopied ? 'Check' : 'Copy'} size={14} />{isCopied ? 'コピー完了！' : 'プロンプトをコピー'}</button>
                </div>
              )}
            </div>

            {/* 履歴 */}
            {imageHistory.length > 1 && (
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-3">
                <h4 className="text-xs font-bold text-gray-500 mb-2 flex items-center gap-1"><Icon name="History" size={12} />生成履歴</h4>
                <div className="grid grid-cols-4 gap-1.5">
                  {imageHistory.slice(1, 9).map((img, i) => (
                    <div key={i} className="relative group cursor-pointer" onClick={() => setGeneratedImage(img)}>
                      <img src={img} alt="" className={`w-full rounded-md border-2 transition-all ${generatedImage === img ? 'border-brand-500' : 'border-transparent hover:border-brand-200'}`} />
                      <button onClick={(e) => { e.stopPropagation(); handleDownload(img); }}
                        className="absolute bottom-0.5 right-0.5 bg-black/50 rounded p-0.5 opacity-0 group-hover:opacity-100 transition-opacity"
                      ><Icon name="Download" size={10} className="text-white" /></button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
